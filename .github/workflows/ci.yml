name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ────────────────────────────────────────────────────────────
  # Backend — Python / FastAPI
  # ────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: skiplanner
          POSTGRES_PASSWORD: skiplanner
          POSTGRES_DB: skiplanner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skiplanner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # ── Runtime ──────────────────────────────────────────────
      API_ENV: staging
      CORS_ORIGINS: https://api-staging.skimate.app

      # ── Amadeus ──────────────────────────────────────────────
      AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
      AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
      AMADEUS_HOSTNAME: test.api.amadeus.com

      # ── Database ─────────────────────────────────────────────
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: services/api
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: services/api
        run: ruff check .

      - name: Type-check (mypy)
        working-directory: services/api
        run: mypy skiplanner_api

      - name: Run tests
        working-directory: services/api
        run: pytest -q --tb=short

  # ────────────────────────────────────────────────────────────
  # Mobile — Expo / TypeScript
  # ────────────────────────────────────────────────────────────
  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest

    env:
      # Staging API base URL baked into the JS bundle for staging builds
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: TypeScript check
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Lint
        working-directory: apps/mobile
        run: npm run lint --if-present
